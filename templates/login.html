<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthEdge AI | Secure Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <style>
        body { 
            background: #1e293b !important; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px; /* Side-la gap kidaikka body-la padding sethuten */
        }
        .login-card {
            width: 100%; 
            max-width: 360px; /* Card agalatha konjam kuraichiten */
            background: white;
            border-radius: 20px;
            padding: 35px 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* --- MOBILE SLIM FIX --- */
        @media (max-width: 576px) {
            .login-card {
                padding: 25px 20px 20px 20px !important; /* Top/Bottom gap-ah kuraichiten */
                border-radius: 16px !important; 
            }
            .login-card h3 {
                font-size: 1.4rem !important; /* Heading chinna aakiyachu */
            }
            .form-control {
                padding: 10px !important; /* Input box size kuraichachu */
                font-size: 0.9rem !important;
            }
            .btn-primary {
                padding: 10px !important; /* Button size slim aakiyachu */
                font-size: 0.95rem !important;
            }
            .mb-4, .mt-4 {
                margin-bottom: 1rem !important; /* Button-ku mela/keela irukura periya gap kuraichachu */
                margin-top: 1rem !important;
            }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-primary">HealthEdge AI</h3>
            <p class="text-muted small">Clinical Portal Access</p>
        </div>

        {% if error %}
            <div class="alert alert-danger small">{{ error }}</div>
        {% endif %}

        <form action="/login" method="POST">
            <div class="mb-3">
                <label class="form-label">Admin Username</label>
                <input type="text" name="username" class="form-control" placeholder="admin" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">LOGIN</button>
        </form>
        
        <div class="mt-4 text-center">
            <p class="small text-muted" style="margin-bottom: 0;">Authorized Personnel Only</p>
        </div>
    </div>
     
</body>
</html>
